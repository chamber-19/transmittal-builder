name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set APP_VERSION from tag
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-build.txt

      - name: Build PyInstaller binary
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          cd backend
          pyinstaller transmittal_backend.spec --distpath ../dist

      - name: Extract CHANGELOG section for this release
        id: changelog
        shell: python
        run: |
          import re, os
          version = os.environ["APP_VERSION"]
          text = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          body = match.group(1).strip() if match else f"Release {version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<EOF\n{body}\nEOF\n")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify launcher of new backend release
        if: ${{ secrets.LAUNCHER_DISPATCH_TOKEN != '' }}
        shell: bash
        env:
          LAUNCHER_DISPATCH_TOKEN: ${{ secrets.LAUNCHER_DISPATCH_TOKEN }}
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $LAUNCHER_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/chamber-19/launcher/dispatches \
            -d "{\"event_type\":\"backend-released\",\"client_payload\":{\"backend_id\":\"transmittal-builder\",\"version\":\"$APP_VERSION\"}}"
          echo "Dispatched backend-released to chamber-19/launcher"
