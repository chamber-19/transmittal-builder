name: Release

# Builds the NSIS installer and publishes a GitHub Release on every v* tag.
#
# Prerequisites:
#   - Repository secret GITHUB_TOKEN (automatic) for creating releases.
#   - Repository secret CHAMBER19_PACKAGES_TOKEN (classic PAT with read:packages
#     + repo scopes) for installing @chamber-19/desktop-toolkit from GitHub Packages
#     and the chamber19-desktop-toolkit Python package from the private repo.
#
# Artifacts produced:
#   - Transmittal.Builder_<version>_x64-setup.exe  (NSIS installer)
#     Note: softprops/action-gh-release sanitises spaces to dots on upload,
#     so the on-disk name differs from the tauri.conf.json productName.
#   - latest.json                                    (update manifest)

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Tool setup ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.13
        # PyInstaller >= 6.10 is required for Python 3.13 support.
        # If PyInstaller fails on 3.13, change this to "3.12" as a fallback
        # and update both RELEASING.md (prerequisites table) and
        # TROUBLESHOOTING.md (§4 — PyInstaller build failures) to document
        # the reason.
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── 3. Python backend → PyInstaller sidecar ─────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.CHAMBER19_PACKAGES_TOKEN }}
        run: |
          git config --global url."https://${{ secrets.CHAMBER19_PACKAGES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build PyInstaller sidecar
        run: |
          cd backend
          pyinstaller transmittal_backend.spec --distpath dist-sidecar --workpath build-sidecar

      - name: Copy sidecar to Tauri resources
        run: |
          $dest = "frontend\src-tauri\binaries\transmittal-backend"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force "backend\dist-sidecar\transmittal-backend\*" $dest
          Write-Host "Sidecar copied to $dest"
        shell: pwsh

      # ── 3b. Build desktop-toolkit-updater shim ─────────────────────────────
      # The shim (desktop-toolkit-updater.exe) is a small standalone binary from
      # the desktop-toolkit framework that survives the parent app's exit and
      # handles the install + relaunch sequence.  It must be present at
      # frontend/src-tauri/desktop-toolkit-updater.exe before `tauri build` so
      # the NSIS HOOK_POSTINSTALL can bundle it alongside the main exe.
      - name: Build desktop-toolkit-updater shim
        run: |
          git clone --depth 1 --branch v2.1.0 `
            https://github.com/chamber-19/desktop-toolkit `
            "$env:RUNNER_TEMP\dtk"
          cargo build --release `
            --manifest-path "$env:RUNNER_TEMP\dtk\crates\desktop-toolkit-updater\Cargo.toml" `
            --target-dir "$env:RUNNER_TEMP\dtk-target"
          $shimExe = "$env:RUNNER_TEMP\dtk-target\release\desktop-toolkit-updater.exe"
          if (-not (Test-Path $shimExe)) {
            throw "[shim] Build failed — binary not found at $shimExe"
          }
          Copy-Item -Force $shimExe "frontend\src-tauri\desktop-toolkit-updater.exe"
          Write-Host "[shim] Placed at frontend\src-tauri\desktop-toolkit-updater.exe"
        shell: pwsh

      # ── 4. Frontend build ────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CHAMBER19_PACKAGES_TOKEN }}
        run: npm ci

      - name: Build Vite frontend
        run: |
          cd frontend
          npm run build

      # ── 5. Tauri build ───────────────────────────────────────────────────
      - name: Build Tauri app (NSIS installer)
        run: |
          cd frontend
          npx tauri build
        env:
          # TODO: add signing when cert is available
          #   signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256
          #     /f cert.pfx /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" *.exe
          # secrets needed: WINDOWS_CERT_BASE64, WINDOWS_CERT_PASSWORD
          TAURI_SIGNING_PRIVATE_KEY: ""   # No code-signing yet; see RELEASING.md

      # ── 6. Locate built artefacts ────────────────────────────────────────
      - name: Locate NSIS installer
        id: find_installer
        run: |
          $exe = Get-ChildItem -Recurse `
            "frontend\src-tauri\target\release\bundle\nsis\*.exe" |
            Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found!" }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"     >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $($exe.FullName)"
        shell: pwsh

      # ── 7. Generate latest.json ──────────────────────────────────────────
      - name: Generate latest.json
        run: node scripts/generate-latest-json.mjs
        env:
          INSTALLER_NAME: ${{ steps.find_installer.outputs.name }}
          TAG_NAME:       ${{ github.ref_name }}

      # ── 8. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name:     "Transmittal Builder ${{ github.ref_name }}"
          fail_on_unmatched_files: true
          files: |
            ${{ steps.find_installer.outputs.path }}
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
