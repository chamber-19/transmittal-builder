name: Backend CI

# Validates that the Python backend installs and its core modules import
# correctly on every supported Python version (3.11 minimum, 3.13 CI target).
#
# Why a matrix?  pandas >=3.0.2 requires Python >=3.11.  Tauri and Rust are
# completely independent of Python; this job confirms the sidecar itself is
# compatible with both the minimum supported version (3.11) and the version
# used by the release workflow (3.13).

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-smoke:
    name: "Python ${{ matrix.python-version }} — install & import"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-test core imports
        working-directory: backend
        run: |
          python - <<'EOF'
          import sys
          import importlib

          required = [
              "fastapi",
              "uvicorn",
              "docx",          # python-docx
              "pandas",
              "openpyxl",
              "pypdf",
              "multipart",     # python-multipart
          ]

          failed = []
          for mod in required:
              try:
                  importlib.import_module(mod)
              except ImportError as exc:
                  failed.append(f"  {mod}: {exc}")

          if failed:
              print("FAIL — missing imports:")
              print("\n".join(failed))
              sys.exit(1)

          import pandas as pd
          from packaging.version import Version
          assert Version(pd.__version__) >= Version("3.0.2"), (
              f"Expected pandas >=3.0.2, got {pd.__version__}"
          )

          print(f"OK — all imports passed on Python {sys.version}")
          EOF
