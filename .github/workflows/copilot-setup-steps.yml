# Pre-installs the toolchain Copilot's coding agent needs to work on this repo.
# Job MUST be named `copilot-setup-steps` (singular). Runs before the agent boots.
#
# Critical: this authenticates npm to GitHub Packages so the agent can run a
# real `npm install` when bumping @chamber-19/desktop-toolkit (regenerating
# package-lock.json with correct integrity hashes). Hand-editing the lockfile
# has bitten us multiple times — this prevents that failure mode permanently.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # required for GitHub Packages npm registry

    steps:
      - uses: actions/checkout@v4

      # ── Node + GitHub Packages auth ────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@chamber-19"

      - name: Install frontend deps (with GH Packages auth)
        working-directory: frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      # ── Python 3.13 + PyInstaller (matches RELEASING.md prereqs) ──────────
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install "pyinstaller>=6.10"

      # ── Rust + Tauri ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          toolchain: "1.77.2"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          python --version
          pyinstaller --version
          cargo --version
          rustc --version