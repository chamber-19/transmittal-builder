<svg viewBox="0 0 150 57" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="R3P Transmittal Builder installer header">

  <defs>
    <linearGradient id="hdr-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a1210"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <!-- White outline filter for R3 mark -->
    <filter id="hdr-outline" color-interpolation-filters="sRGB"
            x="-8%" y="-8%" width="116%" height="116%">
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="thick"/>
      <feFlood flood-color="#ffffff" result="white"/>
      <feComposite in="white" in2="thick" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="150" height="57" fill="url(#hdr-bg)"/>

  <!-- R3P monogram mark (~40×40, left-aligned) -->
  <!-- Rounded-square background -->
  <rect x="7" y="8" width="36" height="36" rx="6"
        fill="#1E5BCA" stroke="#ffffff" stroke-width="1.2"/>

  <!-- R3 letterform inside, scaled to fit 36×36 box (origin 7,8) -->
  <!-- Character scaled ~0.07× of 512 viewbox, translated to position -->
  <g filter="url(#hdr-outline)" transform="translate(7,8) scale(0.0703125)">
    <rect x="136" y="126" width="54"  height="262" fill="#000000"/>
    <rect x="136" y="126" width="198" height="52"  fill="#000000"/>
    <path d="M 190,126 H 344 Q 394,130 394,196 Q 394,258 344,258 H 190 Z" fill="#000000"/>
    <path d="M 190,280 H 330 Q 390,282 390,334 Q 390,388 330,388 H 190 Z" fill="#000000"/>
    <path d="M 258,258 L 344,258 L 394,388 L 308,388 Z"                   fill="#000000"/>
  </g>

  <!-- Separator line -->
  <line x1="51" y1="10" x2="51" y2="47" stroke="rgba(200,130,58,0.2)" stroke-width="1"/>

  <!-- "R3P TRANSMITTAL BUILDER" wordmark -->
  <text x="59" y="22" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700"
    font-variant="small-caps" letter-spacing="0.05em"
    fill="#C8823A">R3P</text>
  <text x="59" y="34" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600"
    letter-spacing="0.10em"
    fill="rgba(156,163,175,0.85)">TRANSMITTAL BUILDER</text>

</svg>
