<svg viewBox="0 0 164 314" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Transmittal Builder installer sidebar">

  <defs>
    <linearGradient id="sb-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e1612"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <!-- White outline filter for monogram mark -->
    <filter id="sb-outline" color-interpolation-filters="sRGB"
            x="-5%" y="-5%" width="110%" height="110%">
      <feMorphology operator="dilate" radius="2" in="SourceAlpha" result="thick"/>
      <feFlood flood-color="#ffffff" result="white"/>
      <feComposite in="white" in2="thick" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="164" height="314" fill="url(#sb-bg)"/>

  <!-- ── Large Anvil-T monogram centered in upper half (~100×100) ── -->
  <!-- Rounded-square forge background centered at (82, 95), size 100×100 -->
  <rect x="32" y="45" width="100" height="100" rx="16"
        fill="#1a1210" stroke="#C8823A" stroke-width="2"/>

  <!-- Anvil-T letterform scaled to fit 100×100 box at (32,45) -->
  <!-- scale = 100/512 ≈ 0.195 -->
  <g filter="url(#sb-outline)" transform="translate(32,45) scale(0.1953125)" fill="#C8823A">
    <rect x="86" y="104" width="340" height="86" rx="10"/>
    <rect x="226" y="190" width="60" height="170"/>
    <path d="M 72,360 H 412 L 446,374 L 446,396 L 412,410 H 72 Z"/>
    <rect x="98" y="410" width="316" height="14"/>
    <path d="M 196,424 H 316 L 304,452 H 208 Z"/>
    <rect x="128" y="452" width="256" height="32" rx="4"/>
  </g>

  <!-- Accent separator below logo -->
  <line x1="30" y1="156" x2="134" y2="156" stroke="rgba(200,130,58,0.2)" stroke-width="1"/>

  <!-- Tagline below logo -->
  <text x="82" y="174" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700"
    font-variant="small-caps" letter-spacing="0.16em"
    fill="rgba(200,130,58,0.9)">ENGINEERED TO DELIVER</text>

  <!-- ── Bottom tagline block ── -->
  <line x1="20" y1="221" x2="144" y2="221" stroke="rgba(200,130,58,0.15)" stroke-width="1"/>

  <text x="82" y="241" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600"
    letter-spacing="0.14em"
    fill="rgba(156,163,175,0.6)">TRANSMITTAL BUILDER</text>

  <!-- Bottom accent line -->
  <rect x="0" y="308" width="164" height="6" fill="rgba(200,130,58,0.12)"/>

</svg>
