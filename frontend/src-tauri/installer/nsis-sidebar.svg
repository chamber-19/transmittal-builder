<svg viewBox="0 0 164 314" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="R3P Transmittal Builder installer sidebar">

  <defs>
    <linearGradient id="sb-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e1612"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <!-- White outline filter for R3 mark -->
    <filter id="sb-outline" color-interpolation-filters="sRGB"
            x="-5%" y="-5%" width="110%" height="110%">
      <feMorphology operator="dilate" radius="2" in="SourceAlpha" result="thick"/>
      <feFlood flood-color="#ffffff" result="white"/>
      <feComposite in="white" in2="thick" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="164" height="314" fill="url(#sb-bg)"/>

  <!-- ── Large R3P monogram centered in upper half (~100×100) ── -->
  <!-- Rounded-square background centered at (82, 95), size 100×100 -->
  <rect x="32" y="45" width="100" height="100" rx="16"
        fill="#1E5BCA" stroke="#ffffff" stroke-width="2"/>

  <!-- R3 letterform scaled to fit 100×100 box at (32,45) -->
  <!-- scale = 100/512 ≈ 0.195, translate to box origin -->
  <g filter="url(#sb-outline)" transform="translate(32,45) scale(0.1953125)">
    <rect x="136" y="126" width="54"  height="262" fill="#000000"/>
    <rect x="136" y="126" width="198" height="52"  fill="#000000"/>
    <path d="M 190,126 H 344 Q 394,130 394,196 Q 394,258 344,258 H 190 Z" fill="#000000"/>
    <path d="M 190,280 H 330 Q 390,282 390,334 Q 390,388 330,388 H 190 Z" fill="#000000"/>
    <path d="M 258,258 L 344,258 L 394,388 L 308,388 Z"                   fill="#000000"/>
  </g>

  <!-- Accent separator below logo -->
  <line x1="30" y1="156" x2="134" y2="156" stroke="rgba(200,130,58,0.2)" stroke-width="1"/>

  <!-- Tagline below logo -->
  <text x="82" y="174" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700"
    font-variant="small-caps" letter-spacing="0.16em"
    fill="rgba(200,130,58,0.9)">ENGINEERED TO DELIVER</text>

  <!-- ── Bottom tagline block ── -->
  <line x1="20" y1="256" x2="144" y2="256" stroke="rgba(200,130,58,0.15)" stroke-width="1"/>

  <text x="82" y="270" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="700"
    font-variant="small-caps" letter-spacing="0.15em"
    fill="rgba(200,130,58,0.9)">R3P</text>

  <text x="82" y="283" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600"
    letter-spacing="0.14em"
    fill="rgba(156,163,175,0.6)">TRANSMITTAL BUILDER</text>

  <!-- Bottom accent line -->
  <rect x="0" y="308" width="164" height="6" fill="rgba(200,130,58,0.12)"/>

</svg>
