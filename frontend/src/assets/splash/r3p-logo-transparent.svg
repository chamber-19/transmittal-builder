<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Transmittal Builder — Anvil-T monogram (transparent background)">

  <defs>
    <!-- Forge-orange mark gradient: bright top → deep ember bottom -->
    <linearGradient id="atMarkT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#EBAA68"/>
      <stop offset="100%" stop-color="#B86F2C"/>
    </linearGradient>

    <!-- Dark outline filter so the mark stays crisp on the splash gradient -->
    <filter id="atOutlineT" color-interpolation-filters="sRGB"
            x="-4%" y="-4%" width="108%" height="108%">
      <feMorphology operator="dilate" radius="4" in="SourceAlpha" result="thick"/>
      <feFlood flood-color="#0a0806" result="dk"/>
      <feComposite in="dk" in2="thick" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Anvil-T mark (no background card) ────────────────────────────────
       The crossbar of the T reads as a hammer head; the stem is the
       handle; the base is a classic anvil silhouette with a right-side
       horn. -->
  <g filter="url(#atOutlineT)" fill="url(#atMarkT)">
    <!-- Hammer head (T crossbar) -->
    <rect x="86" y="104" width="340" height="86" rx="10"/>

    <!-- T stem / hammer handle descending to the anvil -->
    <rect x="226" y="190" width="60" height="170"/>

    <!-- Anvil top face with horn point on the right -->
    <path d="M 72,360 H 412 L 446,374 L 446,396 L 412,410 H 72 Z"/>

    <!-- Anvil body block under the face -->
    <rect x="98" y="410" width="316" height="14"/>

    <!-- Anvil waist -->
    <path d="M 196,424 H 316 L 304,452 H 208 Z"/>

    <!-- Anvil foot/base -->
    <rect x="128" y="452" width="256" height="32" rx="4"/>
  </g>

  <!-- Detail accents -->
  <rect x="240" y="124" width="32" height="48" rx="4" fill="#1a1210" opacity="0.7"/>
  <rect x="406" y="116" width="20" height="62" rx="3" fill="#1a1210" opacity="0.55"/>
  <line x1="84" y1="364" x2="404" y2="364" stroke="#1a1210" stroke-width="2" opacity="0.35"/>

</svg>
