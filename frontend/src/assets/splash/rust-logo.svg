<!-- Rust "Ferris" crab logo — SVG recreation for "Built with Rust" attribution.
     Based on the official Ferris mascot (CC0 / public domain per rust-lang.org usage guidelines).
     See CREDITS.md for full attribution. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Ferris the Rust crab">
  <!-- Left claw arm -->
  <line x1="26" y1="50" x2="10" y2="42" stroke="#E05D2B" stroke-width="5" stroke-linecap="round"/>
  <!-- Right claw arm -->
  <line x1="74" y1="50" x2="90" y2="42" stroke="#E05D2B" stroke-width="5" stroke-linecap="round"/>
  <!-- Left claw -->
  <ellipse cx="8" cy="40" rx="7" ry="5" fill="#E05D2B"/>
  <ellipse cx="5" cy="35" rx="4" ry="3" fill="#E05D2B"/>
  <!-- Right claw -->
  <ellipse cx="92" cy="40" rx="7" ry="5" fill="#E05D2B"/>
  <ellipse cx="95" cy="35" rx="4" ry="3" fill="#E05D2B"/>
  <!-- Left legs -->
  <line x1="32" y1="60" x2="20" y2="74" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="65" x2="14" y2="76" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="70" x2="24" y2="84" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="68" y1="60" x2="80" y2="74" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="72" y1="65" x2="86" y2="76" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="66" y1="70" x2="76" y2="84" stroke="#E05D2B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="26" ry="18" fill="#E05D2B"/>
  <!-- Head -->
  <circle cx="50" cy="42" r="18" fill="#E05D2B"/>
  <!-- Eye whites -->
  <circle cx="43" cy="38" r="5" fill="white"/>
  <circle cx="57" cy="38" r="5" fill="white"/>
  <!-- Eye pupils -->
  <circle cx="44" cy="38.5" r="2.8" fill="#1a0800"/>
  <circle cx="58" cy="38.5" r="2.8" fill="#1a0800"/>
  <!-- Eye shine -->
  <circle cx="45" cy="37.5" r="1" fill="white"/>
  <circle cx="59" cy="37.5" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M43 48 Q50 54 57 48" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Shell segments on body -->
  <ellipse cx="50" cy="60" rx="18" ry="11" fill="none" stroke="#C04820" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="49" x2="50" y2="71" stroke="#C04820" stroke-width="1.5" opacity="0.4"/>
</svg>
