<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="R3P — ROOT3POWER ENGINEERING registered mark">

  <defs>
    <!-- White outline filter: dilate alpha then flood white, merge under source -->
    <filter id="outline-white" color-interpolation-filters="sRGB"
            x="-4%" y="-4%" width="108%" height="108%">
      <feMorphology operator="dilate" radius="5" in="SourceAlpha" result="thick"/>
      <feFlood flood-color="#ffffff" result="white"/>
      <feComposite in="white" in2="thick" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background: R3P blue #1E5BCA, white border -->
  <rect x="4" y="4" width="504" height="504" rx="72"
        fill="#1E5BCA" stroke="#ffffff" stroke-width="8"/>

  <!-- R3 monogram — all shapes fill black, white outline via filter -->
  <!-- Character bounds: x=136–394, y=126–388 (within 76px padding zone) -->
  <g filter="url(#outline-white)">
    <!-- Left vertical spine of R (full height) -->
    <rect x="136" y="126" width="54" height="262" fill="#000000"/>

    <!-- Top crossbar: horizontal arm extending right from spine -->
    <rect x="136" y="126" width="198" height="52" fill="#000000"/>

    <!-- Upper D-shape: R's bowl fused with 3's upper curve -->
    <!-- Flat top at y=126 from x=190 to x=344, then curves right to ~x=394 at y=196, back -->
    <path d="M 190,126 H 344 Q 394,130 394,196 Q 394,258 344,258 H 190 Z"
          fill="#000000"/>

    <!-- Lower D-shape: 3's lower curve -->
    <!-- Flat top at y=280 from x=190 to x=330, then curves right to ~x=388 at y=334, back -->
    <path d="M 190,280 H 330 Q 390,282 390,334 Q 390,388 330,388 H 190 Z"
          fill="#000000"/>

    <!-- R's diagonal leg: triangular stroke from notch area to lower-right -->
    <!-- From (258,258) to (344,258) diagonally down to (394,388) -->
    <path d="M 258,258 L 344,258 L 394,388 L 308,388 Z"
          fill="#000000"/>
  </g>

  <!-- ® mark — bottom-right corner, subtle white, ~20px radius -->
  <circle cx="428" cy="428" r="18" fill="none" stroke="#ffffff" stroke-width="2"
          opacity="0.55"/>
  <text x="428" y="432" text-anchor="middle" dominant-baseline="middle"
        font-family="sans-serif" font-size="16" font-weight="700"
        fill="#ffffff" opacity="0.55">R</text>

</svg>
