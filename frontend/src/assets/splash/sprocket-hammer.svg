<svg id="sprocket-hammer" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg"
  role="img" aria-label="Engineering sprocket with hammer — forging animation">

  <defs>
    <!-- Impact flash radial -->
    <radialGradient id="impact-rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5e0" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ffcc66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8823A" stop-opacity="0"/>
    </radialGradient>

    <!-- Sprocket metal gradient — user-space so the light source stays fixed
         in the SVG viewBox as the sprocket rotates. The bright spot (centered
         at x=200, y=160 = above the sprocket hub) always appears to come from
         above, like a forge flame lighting the top of the gear. -->
    <radialGradient id="sprocket-rg" cx="200" cy="160" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5a5550"/>
      <stop offset="100%" stop-color="#3a3530"/>
    </radialGradient>

    <!-- Hub gradient — also user-space for consistent lighting -->
    <radialGradient id="hub-rg" cx="194" cy="174" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3a3530"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </radialGradient>
  </defs>

  <!-- ── Ambient ground shadow (static — replaces the removed drop-shadow filter) -->
  <ellipse cx="200" cy="264" rx="68" ry="10" fill="#000" opacity="0.45"/>

  <!-- ── Sprocket group — rotated continuously by CSS (CCW) ──────────────── -->
  <g id="sprocket">

    <!-- Rim glow element (display:none via CSS — retained for backward compat) -->
    <path id="rim-glow"
      d="M 200,115 A 65,65 0 1 1 199.999,115"
      fill="#8a5520" opacity="0"/>

    <!-- Rim annulus: outer circle with inner hole (fill-rule evenodd) -->
    <path fill-rule="evenodd" fill="url(#sprocket-rg)"
      d="M 135,180 A 65,65 0 1 1 265,180 A 65,65 0 1 1 135,180
         M 150,180 A 50,50 0 1 0 250,180 A 50,50 0 1 0 150,180"/>

    <!-- Inner ring highlight (subtle lighter ring just inside the outer rim) -->
    <circle cx="200" cy="180" r="54" fill="none" stroke="#6a6560" stroke-width="1" opacity="0.4"/>

    <!-- 16 Teeth (trapezoidal, pre-computed from polar coords, 22.5° apart) -->
    <!-- Strike point tooth at 12 o'clock (k=0): centered at (200,115) -->
    <path fill="#4a4540" d="
      M196.3,130.1 L195.2,115.2 L204.8,115.2 L203.7,130.1 Z
      M215.6,132.5 L220.3,118.3 L229.3,122.0 L222.5,135.4 Z
      M232.6,142.1 L242.4,130.7 L249.3,137.6 L237.9,147.4 Z
      M244.6,157.5 L258.0,150.7 L261.7,159.7 L247.5,164.4 Z
      M249.9,176.3 L264.8,175.2 L264.8,184.8 L249.9,183.7 Z
      M247.5,195.6 L261.7,200.3 L258.0,209.3 L244.6,202.5 Z
      M237.9,212.6 L249.3,222.4 L242.4,229.3 L232.6,217.9 Z
      M222.5,224.6 L229.3,238.0 L220.3,241.7 L215.6,227.5 Z
      M203.7,229.9 L204.8,244.8 L195.2,244.8 L196.3,229.9 Z
      M184.4,227.5 L179.7,241.7 L170.7,238.0 L177.5,224.6 Z
      M167.4,217.9 L157.6,229.3 L150.7,222.4 L162.1,212.6 Z
      M155.4,202.5 L142.0,209.3 L138.3,200.3 L152.5,195.6 Z
      M150.1,183.7 L135.2,184.8 L135.2,175.2 L150.1,176.3 Z
      M152.5,164.4 L138.3,159.7 L142.0,150.7 L155.4,157.5 Z
      M162.1,147.4 L150.7,137.6 L157.6,130.7 L167.4,142.1 Z
      M177.5,135.4 L170.7,122.0 L179.7,118.3 L184.4,132.5 Z
    "/>

    <!-- Three spokes at 90°/210°/330° — nod to ROOT3POWER -->
    <rect x="218" y="177" width="32" height="6" rx="3"
          fill="#4a4540" stroke="#3a3530" stroke-width="1"/>
    <rect x="-16" y="-3" width="32" height="6" rx="3"
          fill="#4a4540" stroke="#3a3530" stroke-width="1"
          transform="translate(183,209.5) rotate(120)"/>
    <rect x="-16" y="-3" width="32" height="6" rx="3"
          fill="#4a4540" stroke="#3a3530" stroke-width="1"
          transform="translate(183,150.5) rotate(240)"/>

    <!-- Hub (central disk) -->
    <circle cx="200" cy="180" r="18" fill="url(#hub-rg)"/>
    <!-- Hub highlight ring -->
    <circle cx="200" cy="180" r="18" fill="none" stroke="#5a5550" stroke-width="1.5" opacity="0.6"/>

    <!-- Bolt hole (center) -->
    <circle cx="200" cy="180" r="5" fill="#1a1210"/>

    <!-- Tooth glow circles — one per tooth tip, lit during strike by CSS -->
    <circle class="tooth-glow-0"  cx="200.0" cy="115.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-1"  cx="224.8" cy="120.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-2"  cx="245.9" cy="134.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-3"  cx="259.9" cy="155.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-4"  cx="264.8" cy="180.0" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-5"  cx="259.9" cy="204.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-6"  cx="245.9" cy="225.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-7"  cx="224.8" cy="239.9" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-8"  cx="200.0" cy="244.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-9"  cx="175.2" cy="239.9" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-10" cx="154.1" cy="225.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-11" cx="140.1" cy="204.8" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-12" cx="135.2" cy="180.0" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-13" cx="140.1" cy="155.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-14" cx="154.1" cy="134.2" r="4" fill="#C8823A" opacity="0"/>
    <circle class="tooth-glow-15" cx="175.2" cy="120.2" r="4" fill="#C8823A" opacity="0"/>

  </g><!-- end #sprocket -->

  <!-- ── Hammer — strikes the top tooth (k=0) at (200, 115) ──────────────── -->
  <g id="hammer">
    <!-- Haft (oak-brown handle) -->
    <rect x="196" y="115" width="9"  height="81" rx="2" fill="#6b4a2a"/>
    <!-- Haft grain highlight -->
    <rect x="199" y="115" width="2"  height="81" rx="1" fill="#8b6a40" opacity="0.5"/>

    <!-- Head (steel, flat-face hammer) -->
    <rect x="171" y="91"  width="58" height="24" rx="2" fill="#4a4540"/>

    <!-- Head — top rim light (bright edge) -->
    <rect x="171" y="91"  width="58" height="4"  rx="2" fill="#6a6560" opacity="0.65"/>

    <!-- Head — striking face (bottom) darker rim -->
    <rect x="171" y="111" width="58" height="4"  rx="2" fill="#5a5a4e" opacity="0.5"/>

    <!-- Head — rear face (left) darker -->
    <rect x="171" y="91"  width="4"  height="24" rx="1" fill="#3a3830" opacity="0.6"/>
  </g>

  <!-- ── Impact flash (circle at strike point) ───────────────────────────── -->
  <circle id="impact-flash"
    cx="200" cy="115"
    r="28"
    fill="url(#impact-rg)"
    opacity="0"/>

  <!-- ── Spark elements (pre-placed at strike point, fly outward) ────────── -->
  <circle class="spark-1"  cx="200" cy="115" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-2"  cx="200" cy="115" r="2.0" fill="#C8823A" opacity="0"/>
  <circle class="spark-3"  cx="200" cy="115" r="3.0" fill="#ffcc66" opacity="0"/>
  <circle class="spark-4"  cx="200" cy="115" r="1.8" fill="#fff5e0" opacity="0"/>
  <circle class="spark-5"  cx="200" cy="115" r="2.2" fill="#C8823A" opacity="0"/>
  <circle class="spark-6"  cx="200" cy="115" r="2.8" fill="#ffcc66" opacity="0"/>
  <circle class="spark-7"  cx="200" cy="115" r="1.5" fill="#fff5e0" opacity="0"/>
  <circle class="spark-8"  cx="200" cy="115" r="2.0" fill="#C8823A" opacity="0"/>
  <circle class="spark-9"  cx="200" cy="115" r="2.5" fill="#ffcc66" opacity="0"/>
  <circle class="spark-10" cx="200" cy="115" r="1.8" fill="#fff5e0" opacity="0"/>

</svg>
