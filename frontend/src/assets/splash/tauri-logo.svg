<!-- Tauri v2 logo — SVG recreation for "Powered by Tauri" attribution.
     Based on the official Tauri brand assets (MIT license per tauri.app).
     See CREDITS.md for full attribution. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Tauri logo">
  <defs>
    <radialGradient id="tauriGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC131" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFC131" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow background -->
  <circle cx="50" cy="50" r="48" fill="url(#tauriGlow)"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#FFC131" stroke-width="3.5"/>
  <!-- Outer ring tick marks -->
  <circle cx="50" cy="6" r="3" fill="#FFC131"/>
  <circle cx="50" cy="94" r="3" fill="#FFC131"/>
  <circle cx="6" cy="50" r="3" fill="#FFC131"/>
  <circle cx="94" cy="50" r="3" fill="#FFC131"/>
  <!-- Middle ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#FFC131" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- Inner filled circle -->
  <circle cx="50" cy="50" r="18" fill="#FFC131"/>
  <!-- Center hole -->
  <circle cx="50" cy="50" r="8" fill="#0F1419"/>
  <!-- Connecting lines from outer to inner (the "T" shape of Tauri) -->
  <line x1="50" y1="20" x2="50" y2="32" stroke="#FFC131" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="68" x2="50" y2="80" stroke="#FFC131" stroke-width="3" stroke-linecap="round"/>
</svg>
